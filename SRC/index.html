<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Fichas Técnicas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: #F6F8FC;
            color: #0F172A;
            line-height: 1.6;
            min-height: 100vh;
        }

        .page-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .main-card {
            width: 100%;
            max-width: 980px;
            background: white;
            border-radius: 18px;
            border: 1px solid rgba(15, 23, 42, 0.06);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
            padding: 26px;
            position: relative;
            transition: all 0.3s ease;
        }

        /* Animated gradient ring - activarse con input focus */
        .main-card.focus-active::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 18px;
            padding: 2px;
            background: linear-gradient(90deg, #2563EB, #8B5CF6, #EC4899, #2563EB);
            background-size: 300% 300%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: gradientRotate 8s linear infinite;
            pointer-events: none;
        }

        @keyframes gradientRotate {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @media (max-width: 640px) {
            .main-card {
                padding: 18px;
            }
        }

        /* Header con logo y título */
        .header-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-logo {
            height: 46px;
            width: auto;
            margin-bottom: 16px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            opacity: 0.95;
            transition: opacity 0.3s ease;
        }

        .brand-logo-fallback {
            height: 46px;
            width: 46px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #2563EB 0%, #8B5CF6 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            font-size: 18px;
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #0F172A;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .subtitle {
            color: #64748B;
            font-size: 1rem;
            font-weight: 500;
        }

        /* Search box */
        .search-section {
            margin-bottom: 28px;
        }

        .search-box {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
            font-size: 18px;
            pointer-events: none;
            z-index: 1;
        }

        input[type="text"] {
            width: 100%;
            height: 52px;
            padding: 0 16px 0 48px;
            font-size: 16px;
            border: 2px solid #E2E8F0;
            border-radius: 14px;
            background: white;
            color: #0F172A;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]::placeholder {
            color: #94A3B8;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        input[type="text"]:focus ~ .search-icon {
            color: #2563EB;
        }

        .search-button {
            height: 52px;
            padding: 0 24px;
            background: #2563EB;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-family: inherit;
        }

        .search-button:hover {
            background: #1D4ED8;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25);
        }

        .search-button:active {
            transform: translateY(0);
        }

        /* Suggestions dropdown */
        #suggestions {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            max-height: 320px;
            overflow-y: auto;
            display: none;
            z-index: 100;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
        }

        #suggestions.visible {
            display: block;
            animation: suggestionsSlide 0.2s ease-out;
        }

        @keyframes suggestionsSlide {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .suggestion-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #F1F5F9;
            transition: background 0.15s ease;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background: #F8FAFC;
        }

        .suggestion-sku {
            font-weight: 600;
            color: #2563EB;
            font-size: 14px;
        }

        .suggestion-name {
            font-size: 13px;
            color: #64748B;
            margin-top: 4px;
            line-height: 1.4;
        }

        /* Results section */
        .results {
            min-height: 80px;
        }

        .result-card {
            background: white;
            padding: 24px;
            border-radius: 14px;
            border: 1px solid #E2E8F0;
            border-left: 4px solid;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
            animation: resultAppear 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes resultAppear {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-card.success {
            border-left-color: #22C55E;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.02) 0%, transparent 100%);
        }

        .result-card.error {
            border-left-color: #EF4444;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.02) 0%, transparent 100%);
        }

        .result-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
        }

        .result-icon {
            font-size: 20px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .result-text-section {
            flex: 1;
        }

        .result-sku {
            font-weight: 600;
            color: #2563EB;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .result-name {
            font-size: 17px;
            font-weight: 700;
            color: #0F172A;
            line-height: 1.3;
            margin-bottom: 16px;
        }

        .result-link a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: #2563EB;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .result-link a:hover {
            background: #1D4ED8;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25);
        }

        .result-unavailable {
            color: #94A3B8;
            font-size: 14px;
            font-style: italic;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 24px 40px;
            color: #94A3B8;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.7;
        }

        .empty-state-text {
            font-size: 16px;
            color: #64748B;
        }

        /* Error state */
        .error-state {
            text-align: center;
            padding: 40px 24px;
        }

        .error-state-title {
            font-size: 16px;
            font-weight: 600;
            color: #EF4444;
            margin-bottom: 8px;
        }

        /* Responsive */
        @media (max-width: 640px) {
            h1 {
                font-size: 1.75rem;
            }

            .subtitle {
                font-size: 14px;
            }

            .search-box {
                flex-direction: column;
                gap: 8px;
            }

            .search-button {
                width: 100%;
            }

            .result-card {
                padding: 18px;
            }

            .result-name {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="main-card" id="mainCard">
            <div class="header-section">
                <img 
                    class="brand-logo" 
                    src="./logo.jpg" 
                    alt="Logo Comertex"
                    onerror="this.style.display='none'; document.querySelector('.brand-logo-fallback').style.display='flex';"
                >
                <div class="brand-logo-fallback" style="display:none;">🏭</div>
                <h1>Buscador de Fichas Técnicas</h1>
                <p class="subtitle">Busca por SKU, nombre del producto o URL del PDF</p>
            </div>

            <div class="search-section">
                <div class="search-box">
                    <div class="search-input-wrapper">
                        <div class="search-icon">🔍</div>
                        <input 
                            type="text" 
                            id="searchInput" 
                            placeholder="Escribe SKU, nombre o URL..."
                            autocomplete="off"
                        >
                        <div id="suggestions"></div>
                    </div>
                    <button class="search-button" onclick="search()">Buscar</button>
                </div>
            </div>

            <div id="results" class="results"></div>
        </div>
    </div>

    <script>
        let allProducts = [];

        // Cargar datos al iniciar
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
            
            // Event listeners
            const searchInput = document.getElementById('searchInput');
            const mainCard = document.getElementById('mainCard');
            
            searchInput.addEventListener('keyup', updateSuggestions);
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    search();
                }
            });
            
            // Animated gradient ring on focus
            searchInput.addEventListener('focus', function() {
                mainCard.classList.add('focus-active');
            });
            
            searchInput.addEventListener('blur', function() {
                mainCard.classList.remove('focus-active');
            });
            
            document.addEventListener('click', function(e) {
                if (e.target.id !== 'searchInput') {
                    hideSuggestions();
                }
            });
        });

        function loadProducts() {
            fetch('data.json')
                .then(response => response.json())
                .then(data => {
                    allProducts = data;
                    console.log(`✓ Cargados ${allProducts.length} productos`);
                })
                .catch(error => {
                    console.error('Error cargando datos:', error);
                    displayError('No se pudieron cargar los datos. Verifica que data.json exista.');
                });
        }

        function updateSuggestions() {
            const input = document.getElementById('searchInput').value.trim().toLowerCase();
            const suggestionsDiv = document.getElementById('suggestions');

            if (input.length === 0) {
                hideSuggestions();
                return;
            }

            const filtered = allProducts.filter(p => 
                p.sku.toLowerCase().includes(input) ||
                p.name.toLowerCase().includes(input) ||
                (p.pdf && p.pdf.toLowerCase().includes(input))
            ).slice(0, 8);

            if (filtered.length === 0) {
                hideSuggestions();
                return;
            }

            suggestionsDiv.innerHTML = filtered.map(p => `
                <div class="suggestion-item" onclick="selectSuggestion('${p.sku.replace(/'/g, "\\'")}', '${p.name.replace(/'/g, "\\'")}', '${(p.pdf || '').replace(/'/g, "\\'")}')">
                    <div class="suggestion-sku">${escapeHtml(p.sku)}</div>
                    <div class="suggestion-name">${escapeHtml(p.name.substring(0, 75))}</div>
                </div>
            `).join('');

            suggestionsDiv.classList.add('visible');
        }

        function selectSuggestion(sku, name, pdf) {
            document.getElementById('searchInput').value = name;
            hideSuggestions();
            // Mostrar directamente el resultado con los datos que ya tenemos
            displayResult({ sku, name, pdf });
        }

        function hideSuggestions() {
            document.getElementById('suggestions').classList.remove('visible');
        }

        function search() {
            const input = document.getElementById('searchInput').value.trim();
            const searchLower = input.toLowerCase();

            if (input.length === 0) {
                displayEmpty();
                return;
            }

            const found = allProducts.find(p => 
                p.sku.toLowerCase() === searchLower ||
                p.name.toLowerCase() === searchLower ||
                p.sku.toLowerCase().includes(searchLower) ||
                p.name.toLowerCase().includes(searchLower) ||
                (p.pdf && p.pdf.toLowerCase().includes(searchLower))
            );

            if (found) {
                displayResult(found);
            } else {
                displayNotFound(input);
            }
        }

        function displayResult(product) {
            const resultsDiv = document.getElementById('results');
            const pdfUrl = product.pdf || '';
            
            const buttonHtml = pdfUrl ? 
                `<a href="${pdfUrl}" target="_blank" onclick="if(this.href) window.open(this.href); return false;">📥 Descargar Ficha</a>` :
                '';
            
            resultsDiv.innerHTML = `
                <div class="result-card success">
                    <div class="result-header">
                        <div class="result-icon">✓</div>
                        <div class="result-text-section">
                            <div class="result-sku">SKU: ${escapeHtml(product.sku)}</div>
                            <div class="result-name">${escapeHtml(product.name)}</div>
                            <div class="result-link">
                                ${buttonHtml || '<span class="result-unavailable">Ficha técnica no disponible</span>'}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function displayNotFound(query) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="result-card error">
                    <div class="result-header">
                        <div class="result-icon">✕</div>
                        <div class="result-text-section">
                            <div class="error-state-title">No encontrado</div>
                            <p style="margin-top: 8px; color: #64748B; font-size: 14px;">
                                No hay coincidencias para: <strong>${escapeHtml(query)}</strong>
                            </p>
                        </div>
                    </div>
                </div>
            `;
        }

        function displayEmpty() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <p class="empty-state-text">Escribe algo para buscar una ficha técnica</p>
                </div>
            `;
        }

        function displayError(message) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="result-card error">
                    <div class="error-state">
                        <div class="error-state-title">⚠️ Error</div>
                        <p style="margin-top: 8px; color: #64748B; font-size: 14px;">${message}</p>
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
